<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quản lý phòng trọ - Danh sách, thêm, sửa, xóa phòng">
    <title>Phòng trọ | Quản lý Nhà trọ</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/assets/images/nt-logo.png">
    <link rel="apple-touch-icon" href="/nt-nt-apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Nhà Trọ">
    <meta name="theme-color" content="#ffffff">
</head>

<body>
    <div class="app-layout">

        <!-- ========== SIDEBAR ========== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i data-lucide="building-2"></i></div>
                <div class="sidebar-brand">
                    <h1>Nhà Trọ</h1>
                    <span>Hệ thống quản lý</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-title">Menu chính</div>
                <a href="dashboard.html" class="nav-item" data-page="dashboard.html">
                    <span class="nav-icon"><i data-lucide="layout-dashboard"></i></span>
                    <span>Tổng quan</span>
                </a>
                <a href="rooms.html" class="nav-item" data-page="rooms.html">
                    <span class="nav-icon"><i data-lucide="door-open"></i></span>
                    <span>Phòng trọ</span>
                </a>
                <a href="contracts.html" class="nav-item" data-page="contracts.html">
                    <span class="nav-icon"><i data-lucide="file-text"></i></span>
                    <span>Hợp đồng</span>
                </a>
                <a href="billing.html" class="nav-item" data-page="billing.html">
                    <span class="nav-icon"><i data-lucide="wallet"></i></span>
                    <span>Tính tiền</span>
                </a>

                <div class="nav-section-title">Hệ thống</div>
                <a href="settings.html" class="nav-item" data-page="settings.html">
                    <span class="nav-icon"><i data-lucide="settings"></i></span>
                    <span>Cài đặt</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user sidebar-user-cursor" onclick="handleLogout()" title="Nhấn để đăng xuất">
                    <div class="sidebar-avatar" id="sidebarUserAvatar">A</div>
                    <div class="sidebar-user-info">
                        <div class="sidebar-user-name" id="sidebarUserName">Admin</div>
                        <div class="sidebar-user-role" id="sidebarUserRole">Quản trị viên</div>
                    </div>
                    <span class="sidebar-logout-icon"><i data-lucide="log-out"></i></span>
                </div>
            </div>
        </aside>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- ========== MAIN CONTENT ========== -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <button class="hamburger-btn" id="hamburgerBtn" aria-label="Menu"><i
                            data-lucide="menu"></i></button>
                    <div>
                        <h1 class="page-title">Phòng trọ</h1>
                        <p class="page-subtitle">Quản lý danh sách phòng — <span id="roomCount">0</span> phòng</p>
                    </div>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary admin-only" onclick="openAddRoom()">
                        <i data-lucide="plus"></i> Thêm phòng
                    </button>
                </div>
            </header>

            <div class="page-content">

                <!-- Toolbar / Filters -->
                <div class="toolbar">
                    <div class="toolbar-left">
                        <select class="form-control" id="filterStatus" onchange="filterRooms()"
                            style="width: auto; min-width: 150px;">
                            <option value="">Tất cả trạng thái</option>
                            <option value="available">🟢 Trống</option>
                            <option value="occupied">🔴 Đang thuê</option>
                            <option value="maintenance">🟡 Bảo trì</option>
                        </select>
                        <select class="form-control" id="filterBranch" onchange="filterRooms()"
                            style="width: auto; min-width: 150px;">
                            <option value="">Tất cả cơ sở</option>
                            <!-- Dynamic options loaded from settings -->
                        </select>
                    </div>
                </div>

                <!-- Rooms Table -->
                <div class="card">
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Phòng</th>
                                    <th>Cơ sở</th>
                                    <th>Diện tích</th>
                                    <th>Giá thuê</th>
                                    <th>Người thuê</th>
                                    <th>Trạng thái</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="roomsTableBody">
                                <!-- Rendered by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- ========== MODAL: Add/Edit Room ========== -->
    <div class="modal-overlay" id="roomModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="roomModalTitle">Thêm phòng mới</h3>
                <button class="modal-close" onclick="Modal.close('roomModal')"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <form id="roomForm" onsubmit="event.preventDefault(); saveRoom();">
                    <input type="hidden" id="roomId">

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Số phòng <span class="required">*</span></label>
                            <input type="text" class="form-control" id="roomNumber" placeholder="VD: P101" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Cơ sở <span class="required">*</span></label>
                            <select class="form-control" id="roomBranch" title="Chọn cơ sở" required>
                                <option value="">-- Chọn cơ sở --</option>
                                <!-- Dynamic options loaded from settings -->
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Giá thuê (VNĐ/tháng) <span class="required">*</span></label>
                            <input type="number" class="form-control" id="roomPrice" placeholder="3000000" required
                                min="0">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Diện tích (m²)</label>
                            <input type="number" class="form-control" id="roomArea" placeholder="20" min="0">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Mô tả</label>
                        <textarea class="form-control" id="roomDescription" rows="2"
                            placeholder="VD: Phòng đơn, WC riêng, có ban công"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="Modal.close('roomModal')">Hủy</button>
                <button class="btn btn-primary" onclick="saveRoom()">
                    <i data-lucide="check"></i> Lưu
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/datastore.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/rooms.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
